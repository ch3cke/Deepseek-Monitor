name: DeepSeek Usage Summary

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily summary
        run: python -m app.main summary
        env:
          AUTH: ${{ secrets.AUTH }}
          MONITORED_USERS: ${{ secrets.MONITORED_USERS }}
          DEFAULT_BUDGET_LIMIT: ${{ secrets.DEFAULT_BUDGET_LIMIT }}
          DEFAULT_WARNING_THRESHOLD: ${{ secrets.DEFAULT_WARNING_THRESHOLD }}
          DEEPSEEK_INTERCOM_DEVICE_ID: ${{ secrets.DEEPSEEK_INTERCOM_DEVICE_ID }}
          DEEPSEEK_HWWAFSESID: ${{ secrets.DEEPSEEK_HWWAFSESID }}
          DEEPSEEK_HWWAFSESTIME: ${{ secrets.DEEPSEEK_HWWAFSESTIME }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          FEISHU_BOT_WEBHOOK_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          FEISHU_BOT_KEYWORD: ${{ secrets.FEISHU_BOT_KEYWORD }}
          FEISHU_BOT_MESSAGE_TYPE: ${{ secrets.FEISHU_BOT_MESSAGE_TYPE }}
          PYTHONUNBUFFERED: "1"
