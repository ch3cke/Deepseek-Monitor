name: DeepSeek Usage Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run usage checker
        run: python main.py
        env:
          AUTH: ${{ secrets.AUTH }}
          DEEPSEEK_INTERCOM_DEVICE_ID: ${{ secrets.DEEPSEEK_INTERCOM_DEVICE_ID }}
          DEEPSEEK_HWWAFSESID: ${{ secrets.DEEPSEEK_HWWAFSESID }}
          DEEPSEEK_HWWAFSESTIME: ${{ secrets.DEEPSEEK_HWWAFSESTIME }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
