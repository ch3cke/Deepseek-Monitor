name: DeepSeek Usage Check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check-usage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run usage checker
        run: python -m app.main monitor
        env:
          AUTH: ${{ secrets.AUTH }}
          MONITORED_USERS: ${{ secrets.MONITORED_USERS }}

          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_API_KEYS_TABLE_ID: ${{ secrets.FEISHU_BITABLE_API_KEYS_TABLE_ID }}
          FEISHU_BITABLE_USAGE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_USAGE_TABLE_ID }}
          FEISHU_BITABLE_EVENTS_TABLE_ID: ${{ secrets.FEISHU_BITABLE_EVENTS_TABLE_ID }}
