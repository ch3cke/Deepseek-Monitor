version: '3.8'

services:
  web:
    build: .
    container_name: deepseek_web
    # 启动 FastAPI 服务
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      # 将数据库和 env 文件挂载出来，避免容器重启数据丢失，也方便修改配置
      - ./usage_history.db:/app/usage_history.db
      - ./.env:/app/.env
    restart: always

  cron:
    build: .
    container_name: deepseek_cron
    # 每 1800 秒（30分钟）执行一次抓取任务，然后休眠。避免了手动配置主机的 Crontab
    command: sh -c "while true; do python main.py; sleep 1800; done"
    volumes:
      - ./usage_history.db:/app/usage_history.db
      - ./.env:/app/.env
    restart: always

